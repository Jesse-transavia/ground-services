<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ground Operations · Internal</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --green-1:#05CE78;
    --green-2:#00AB61;
    --white:#FFFFFF;
    --ruby:#E20076;
    --navy:#140D8A;
    --champagne:#F9F0E9;
    --pink:#F385FF;
    --peach:#FF8867;
    --blue:#0053FF;
    --ink:#0B0A2A;
    --margin-pct: 10vmin; /* 10% of short side */
  }
  *{box-sizing:border-box}
  html{margin:0;padding:0;scroll-snap-type:y mandatory;overflow-y:scroll;overflow-x:hidden;height:100%}
  body{margin:0;padding:0;background:var(--champagne);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;height:100%}
  .display{font-family:'Manrope',system-ui,sans-serif;letter-spacing:-0.035em;line-height:0.95}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  a{color:inherit;text-decoration:none}

  /* -------- ambient background -------- */
  .sky{
    position:fixed; inset:0; z-index:-2; overflow:hidden;
    background: var(--champagne);
  }
  .grain{
    position:fixed; inset:-50%; z-index:-1; pointer-events:none; opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
    mix-blend-mode:multiply;
  }
  .orb{
    position:fixed; border-radius:50%; filter:blur(80px); z-index:-1;
    will-change:transform;
  }
  /* ambient background */
  .orb.a{ width:42vw; height:42vw; background:#05CE78; top:-12vw; right:-10vw; opacity:.55; animation:drift1 28s ease-in-out infinite; }
  .orb.b{ width:34vw; height:34vw; background:#F385FF; bottom:-14vw; left:-10vw; opacity:.38; animation:drift2 34s ease-in-out infinite; }
  .orb.c{ width:26vw; height:26vw; background:#FF8867; top:55%; left:52%; opacity:.30; animation:drift3 24s ease-in-out infinite; }
  .orb.d{ width:20vw; height:20vw; background:#0053FF; top:20%; left:30%; opacity:.18; animation:drift2 38s ease-in-out infinite reverse; }

  @keyframes drift1{ 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-3vw,4vw) scale(1.08)} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(5vw,-3vw) scale(1.12)} }
  @keyframes drift3{ 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-42%,-58%) scale(1.18)} }

  /* page shell with 10% short-side margin */
  .shell{
    height:100dvh;
    overflow:hidden;
    scroll-snap-align:start;
    padding: clamp(16px,4vmin,44px) var(--margin-pct);
    display:flex; flex-direction:column;
    position:relative; z-index:1;
  }

  /* nav */
  .nav{
    display:flex; align-items:center; gap:20px;
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,.9);
    border-radius:999px;
    padding:10px 16px 10px 14px;
    box-shadow: 0 8px 32px -8px rgba(20,13,138,.14), 0 1px 0 rgba(255,255,255,.95) inset;
    width:fit-content; max-width:100%;
    transition: box-shadow .5s cubic-bezier(.32,.72,0,1);
  }
  .nav:hover{
    box-shadow: 0 14px 48px -8px rgba(20,13,138,.2), 0 1px 0 rgba(255,255,255,.98) inset;
  }
  .mark{
    display:flex; align-items:center; gap:14px;
  }
  .mark .logo-img{
    height:32px; width:auto; display:block;
    filter: drop-shadow(0 4px 12px rgba(5,206,120,.25));
    animation: logoFadeIn 1s cubic-bezier(.2,.75,.2,1) both;
  }
  @keyframes logoFadeIn{ from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none} }
  .mark .mark-divider{
    width:1px; height:20px; background:rgba(20,13,138,.18);
  }
  .mark .mark-sub{
    font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--navy); opacity:.7; font-weight:500;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1); box-shadow:0 6px 18px -6px rgba(5,206,120,.55)}
    50%{transform:scale(1.06); box-shadow:0 10px 26px -6px rgba(5,206,120,.85)}
  }
  .pill{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid rgba(20,13,138,.18); border-radius:999px; padding:8px 14px;
    font-size:11px; font-weight:500; color:var(--navy); background:rgba(255,255,255,.5);
    backdrop-filter:blur(8px);
    font-family:'JetBrains Mono'; letter-spacing:.08em; text-transform:uppercase;
  }
  .pulse-dot{ width:7px;height:7px;border-radius:50%; background:var(--green-1); position:relative; }
  .pulse-dot::after{content:""; position:absolute; inset:-4px; border-radius:50%; border:2px solid var(--green-1); animation:ringPulse 2.2s ease-out infinite;}
  @keyframes ringPulse{ 0%{transform:scale(.6); opacity:.9} 100%{transform:scale(2.2); opacity:0} }

  /* hero */
  .hero{
    flex:1;
    display:flex; flex-direction:column; justify-content:center;
    padding: 2% 0 1%;
    max-width: 900px;
  }
  .hero-main{ display:flex; flex-direction:column; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono'; text-transform:uppercase;
    font-size:11px; letter-spacing:0.16em; color:var(--navy); opacity:.65;
  }
  .eyebrow .tick{ width:22px; height:1px; background:var(--navy); opacity:.5 }

  h1.display{
    font-size:clamp(36px, 4.5vw, 68px); font-weight:700; color:var(--navy);
    margin:14px 0 0; max-width:16ch;
  }
  h1 .leaf{
    background:linear-gradient(92deg,var(--green-1),var(--green-2) 60%,var(--navy));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    display:inline-block;
  }
  h1 .stroke{
    -webkit-text-stroke: 1.5px var(--navy); color:transparent; font-style:italic;
    font-weight:500; display:inline-block;
  }
  .lede{
    max-width:560px; margin-top:12px;
    font-size:14px; line-height:1.5; color:rgba(11,10,42,.7);
  }

  /* word reveal */
  .reveal .w{ display:inline-block; opacity:0; filter:blur(14px); transform:translateY(14px); }
  .reveal.in .w{ animation: wReveal .9s cubic-bezier(.2,.75,.2,1) forwards; }
  @keyframes wReveal{ to{opacity:1; filter:blur(0); transform:none} }

  /* ----- three option cards ----- */
  .section-rule{
    height:1px;
    background:linear-gradient(to right, rgba(20,13,138,.18) 0%, rgba(20,13,138,.07) 55%, transparent 100%);
    margin-top:22px;
  }
  .cards{
    display:grid;
    grid-template-columns: 1.55fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap:18px; margin-top:20px;
  }
  .card-shell{
    border-radius:24px;
    padding:3px;
    background:rgba(255,255,255,.22);
    border:1px solid rgba(255,255,255,.55);
    box-shadow: 0 1px 0 rgba(255,255,255,.65) inset;
  }
  .card-shell:nth-child(1){ grid-row: 1 / 3; }
  .card{
    position:relative; isolation:isolate; z-index:1;
    background: var(--bg, rgba(255,255,255,.48));
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid var(--border, rgba(255,255,255,.72));
    border-bottom-color: var(--border-b, rgba(255,255,255,.32));
    border-right-color:  var(--border-r, rgba(255,255,255,.32));
    border-radius:20px;
    padding:28px 26px 24px;
    min-height:240px;
    display:flex; flex-direction:column; gap:16px;
    box-shadow:
      0 28px 64px -36px var(--shadow, rgba(20,13,138,.28)),
      0 2px 0 0 rgba(255,255,255,.85) inset,
      0 -1px 0 0 rgba(255,255,255,.18) inset,
      1px 0 0 0 rgba(255,255,255,.55) inset;
    cursor:pointer; overflow:hidden;
    transition: transform .7s cubic-bezier(.32,.72,0,1), box-shadow .7s cubic-bezier(.32,.72,0,1), border-color .6s, background .6s, opacity .7s cubic-bezier(.32,.72,0,1);
    opacity:0; transform:translateY(24px);
    color: var(--fg, var(--navy));
  }
  .card.revealed{ animation: cardIn .85s cubic-bezier(.32,.72,0,1) forwards; }
  .card-shell:nth-child(1) .card.revealed{ animation-delay:0s }
  .card-shell:nth-child(2) .card.revealed{ animation-delay:.13s }
  .card-shell:nth-child(3) .card.revealed{ animation-delay:.26s }
  @keyframes cardIn{ to{opacity:1; transform:none} }

  .card:hover{
    transform:translateY(-8px) scale(1.014);
    background: var(--bg-hover, rgba(255,255,255,.62));
    box-shadow:
      0 48px 96px -36px var(--shadow, rgba(20,13,138,.44)),
      0 2px 0 0 rgba(255,255,255,.95) inset,
      0 -1px 0 0 rgba(255,255,255,.22) inset,
      1px 0 0 0 rgba(255,255,255,.65) inset;
  }
  .card:active{ transform:translateY(-4px) scale(1.007); }
  .card::before{
    /* top-lit specular sheen */
    content:""; position:absolute; inset:0; z-index:-1;
    background:
      linear-gradient(170deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,.08) 40%, transparent 65%),
      radial-gradient(110% 120% at 80% -10%, var(--glow, rgba(255,255,255,.5)) 0%, transparent 55%);
    opacity:.8; transition:opacity .5s;
  }
  .card:hover::before{ opacity:1 }
  .card::after{
    /* frosted noise texture */
    content:""; position:absolute; inset:0; z-index:-1; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
    mix-blend-mode:overlay; opacity:.12;
  }
  .card.light::after{ mix-blend-mode:multiply; opacity:.06 }

  .card h3, .card p, .card-cta, .card-num, .meta{ color: var(--fg, var(--navy)); }
  .card p{ color: var(--fg-dim, rgba(11,10,42,.65)); }
  .card-num{ color: var(--fg-dim, rgba(20,13,138,.45)); }
  .meta{ color: var(--fg-dim, rgba(20,13,138,.5)); }
  .card-foot{ border-top-color: var(--divider, rgba(20,13,138,.14)) !important; }
  .card-cta .arrc{ background: var(--fg, var(--navy)); color: var(--bg-solid, #fff); }
  .card:hover .card-cta .arrc{ background: var(--tint); color:#fff }

  .card-top{
    display:flex; align-items:center; justify-content:space-between;
  }
  .glyph-box{
    width:54px; height:54px; border-radius:16px;
    background: var(--tint, var(--green-1));
    display:grid; place-items:center; color:#fff;
    box-shadow: 0 12px 28px -12px var(--tintShadow, rgba(5,206,120,.6)), inset 0 0 0 1px rgba(255,255,255,.18);
    transition: transform .6s cubic-bezier(.2,.8,.2,1), border-radius .6s;
    position:relative;
  }
  .card:hover .glyph-box{ transform:rotate(-6deg) scale(1.05); border-radius:22px }
  .glyph-box svg{ width:26px; height:26px }

  .card-num{
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(20,13,138,.45);
  }

  .card h3{
    font-family:'Manrope'; font-weight:700; font-size:26px; letter-spacing:-0.02em;
    color:var(--navy); margin:0; line-height:1.05;
  }
  .card p{
    margin:0; font-size:14px; line-height:1.5; color:rgba(11,10,42,.65);
  }

  .card-foot{
    margin-top:auto;
    display:flex; align-items:center; justify-content:space-between;
    padding-top:16px; border-top:1px dashed rgba(20,13,138,.14);
  }
  .card-cta{
    display:inline-flex; align-items:center; gap:8px;
    font-size:13px; font-weight:600; color:var(--navy);
    transition: gap .4s;
  }
  .card:hover .card-cta{ gap:12px }
  .card-cta .arrc{
    width:28px; height:28px; border-radius:50%;
    background:var(--navy); color:#fff;
    display:grid; place-items:center;
    box-shadow: 0 4px 12px -4px rgba(20,13,138,.32);
    transition: background .5s cubic-bezier(.32,.72,0,1), transform .5s cubic-bezier(.32,.72,0,1), box-shadow .5s cubic-bezier(.32,.72,0,1);
  }
  .card:hover .card-cta .arrc{ background:var(--tint); transform:translateX(3px) translateY(-2px) scale(1.08); box-shadow:0 6px 18px -4px rgba(0,0,0,.18) }
  .card-cta .arrc svg{width:12px;height:12px}

  .meta{
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:rgba(20,13,138,.5);
  }

  /* tiny animated accents inside each card */
  .mini{
    position:absolute; pointer-events:none;
  }
  .mini.bars{ bottom:72px; right:18px; display:flex; gap:3px; align-items:flex-end; height:26px; opacity:.5}
  .mini.bars span{ display:block; width:3px; background:var(--tint); border-radius:2px; animation: barPulse 2.4s ease-in-out infinite; }
  .mini.bars span:nth-child(1){height:40%; animation-delay:0s}
  .mini.bars span:nth-child(2){height:80%; animation-delay:.2s}
  .mini.bars span:nth-child(3){height:55%; animation-delay:.4s}
  .mini.bars span:nth-child(4){height:95%; animation-delay:.6s}
  .mini.bars span:nth-child(5){height:65%; animation-delay:.8s}
  @keyframes barPulse{ 0%,100%{transform:scaleY(.6)} 50%{transform:scaleY(1)} }

  .mini.orbit{
    bottom:78px; right:14px; width:36px; height:36px; opacity:.4;
  }
  .mini.orbit svg{width:100%;height:100%; animation:spin 14s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .mini.nodes{
    bottom:70px; right:16px; width:46px; height:30px; opacity:.45;
  }
  .mini.nodes circle{ animation: nodePulse 3s ease-in-out infinite }
  .mini.nodes circle:nth-child(2){ animation-delay:.4s}
  .mini.nodes circle:nth-child(3){ animation-delay:.8s}
  .mini.nodes circle:nth-child(4){ animation-delay:1.2s}
  @keyframes nodePulse{ 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ----- live panel (right side) ----- */
  .live-panel{
    position:relative;
    border-radius:26px; overflow:hidden;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.8);
    box-shadow: 0 32px 70px -36px rgba(20,13,138,.35), 0 1px 0 rgba(255,255,255,.9) inset;
    padding:18px;
    max-height: none;
    display:flex; flex-direction:column; gap:14px;
    animation: cardIn 1.1s cubic-bezier(.2,.75,.2,1) .3s both;
  }
  .lp-h{
    display:flex; align-items:center; justify-content:space-between;
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--navy); opacity:.7;
  }
  .lp-h .live-dot{ display:inline-flex; align-items:center; gap:6px }
  .lp-h .live-dot .d{ width:7px; height:7px; border-radius:50%; background:var(--ruby); position:relative; }
  .lp-h .live-dot .d::after{ content:""; position:absolute; inset:-4px; border-radius:50%; border:2px solid var(--ruby); animation: ringPulse 2.2s ease-out infinite }

  /* EU map */
  .lp-map{
    position:relative; height:195px; border-radius:16px;
    background: linear-gradient(165deg, #F2FAF5 0%, #FDF7F1 100%);
    overflow:hidden;
    border:1px solid rgba(20,13,138,.06);
  }
  .lp-map > svg.map-bg{ position:absolute; inset:0; width:100%; height:100%; }
  .lp-map .eu-path{ fill: rgba(20,13,138,.06); stroke: rgba(20,13,138,.25); stroke-width:.6; stroke-linejoin:round; }
  .lp-map .ams-dot{
    position:absolute; width:9px; height:9px; border-radius:50%;
    background:var(--green-1); transform:translate(-50%,-50%);
    box-shadow: 0 0 0 2px rgba(255,255,255,.9);
    z-index:2;
  }
  .lp-map .ams-dot::after{
    content:""; position:absolute; inset:-4px; border-radius:50%; border:1.5px solid var(--green-1);
    animation: mapRing 2.6s ease-out infinite;
  }
  .lp-map .ams-label{
    position:absolute; transform:translate(6px,-50%);
    font-family:'JetBrains Mono'; font-size:9px; letter-spacing:.12em;
    color:var(--navy); opacity:.7; text-transform:uppercase;
    background:rgba(255,255,255,.75); padding:2px 5px; border-radius:4px;
    z-index:2;
  }
  .lp-map .fp{
    position:absolute; transform: translate(-50%,-50%) rotate(var(--r,0deg));
    transition: left .9s ease-out, top .9s ease-out, transform .9s ease-out;
    pointer-events:none;
  }
  .lp-map .fp svg{ width:9px; height:9px; display:block; }
  .lp-map .fp.on-time path{ fill: var(--navy); }
  .lp-map .fp.delayed path{ fill: var(--ruby); }
  .lp-map .lp-status{
    position:absolute; bottom:8px; left:10px;
    display:inline-flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono'; font-size:9px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--navy); opacity:.6;
    background:rgba(255,255,255,.65); padding:3px 7px; border-radius:999px;
  }
  .lp-map .lp-status .sd{ width:5px; height:5px; border-radius:50%; background:var(--green-2); animation: opaPulse 2s ease-in-out infinite }
  @keyframes opaPulse{ 0%,100%{opacity:.4} 50%{opacity:1} }
  @keyframes mapRing{ 0%{transform:scale(.6); opacity:.8} 100%{transform:scale(2.8); opacity:0} }

  /* ticker of delay events */
  .lp-section-title{
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--navy); opacity:.55; margin-top:4px;
  }
  .lp-feed{
    position:relative; flex:1; overflow:hidden;
    mask-image: linear-gradient(to bottom, transparent 0, #000 8%, #000 92%, transparent 100%);
  }
  .lp-feed-scroll{
    display:flex; flex-direction:column; gap:8px;
    animation: feedScroll 22s linear infinite;
  }
  @keyframes feedScroll{
    from{ transform:translateY(0) }
    to{ transform:translateY(-50%) }
  }
  .lp-row{
    display:grid; grid-template-columns: 46px 1fr auto; gap:10px;
    align-items:center; padding:8px 10px;
    background:rgba(255,255,255,.7); border-radius:10px;
    border:1px solid rgba(20,13,138,.06);
    font-size:12px;
  }
  .lp-code{
    font-family:'JetBrains Mono'; font-weight:600; font-size:12px;
    text-align:center; padding:3px 0; border-radius:6px;
    background:var(--navy); color:#fff;
  }
  .lp-code.g{ background:var(--green-2) }
  .lp-code.r{ background:var(--ruby) }
  .lp-code.p{ background:var(--peach); color:var(--navy) }
  .lp-flight{ color:var(--navy); font-weight:600 }
  .lp-flight small{ display:block; font-family:'JetBrains Mono'; font-size:9px; letter-spacing:.12em; opacity:.55; text-transform:uppercase; font-weight:500; margin-top:1px }
  .lp-time{ font-family:'JetBrains Mono'; font-size:10px; color:rgba(20,13,138,.55); letter-spacing:.06em }

  /* counters */
  .lp-counters{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
    padding-top:10px; border-top:1px dashed rgba(20,13,138,.14);
  }
  .lp-counter .v{
    font-family:'Manrope'; font-weight:700; font-size:22px; color:var(--navy); letter-spacing:-0.02em;
  }
  .lp-counter .l{
    font-family:'JetBrains Mono'; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:rgba(20,13,138,.55);
  }

  /* bottom strip */
  .footer{
    margin-top:auto; padding-top:28px;
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(20,13,138,.55);
    border-top:1px solid rgba(20,13,138,.1);
    gap:20px; flex-wrap:wrap;
  }
  .footer .kbd{
    display:inline-flex; align-items:center; gap:6px;
  }
  .footer .key{
    display:inline-grid; place-items:center;
    min-width:18px; height:18px; padding:0 4px;
    background:#fff; border-radius:4px;
    box-shadow: 0 1px 0 rgba(20,13,138,.2), inset 0 0 0 1px rgba(20,13,138,.1);
    font-size:10px; color:var(--navy);
  }

  /* tweaks panel */
  .tweaks{
    position:fixed; right:22px; bottom:22px; z-index:50;
    width:280px; padding:16px;
    background:#fff; border-radius:18px;
    box-shadow:0 22px 50px -20px rgba(20,13,138,.45);
    border:1px solid rgba(20,13,138,.1);
    display:none;
    font-size:13px;
  }
  .tweaks.on{ display:block }
  .tweaks h4{ margin:0 0 10px; font-family:'Manrope'; font-size:13px; letter-spacing:.02em}
  .tweaks label{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px dashed rgba(20,13,138,.1)}
  .tweaks label:last-child{border:0}
  .tweaks select, .tweaks input[type=text]{ font-family:inherit; border:1px solid rgba(20,13,138,.15); border-radius:8px; padding:3px 6px; background:#fff; font-size:12px; width:130px; }

  @media (max-width: 960px){
    .cards{ grid-template-columns:1fr; grid-template-rows:auto; }
    .card-shell:nth-child(1){ grid-row:auto; }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.1s !important }
  }

  /* ── GATE BOARD ── */
  .gate-board {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 22px;
  }
  .gate-row {
    position: relative;
    display: grid;
    grid-template-columns: 40px 34px 1fr auto 32px;
    align-items: center;
    gap: 18px;
    padding: 17px 22px;
    background: rgba(255,255,255,.52);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,.75);
    border-bottom-color: rgba(255,255,255,.3);
    border-right-color: rgba(255,255,255,.3);
    border-radius: 16px;
    text-decoration: none;
    box-shadow: 0 2px 0 rgba(255,255,255,.8) inset, 0 12px 32px -16px rgba(20,13,138,.14);
    transition: transform .4s cubic-bezier(.32,.72,0,1), box-shadow .4s cubic-bezier(.32,.72,0,1), background .4s;
    cursor: pointer;
    opacity: 0;
    animation: gateIn .6s cubic-bezier(.32,.72,0,1) forwards;
  }
  .gate-beta-badge {
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%) translateY(6px) scale(.88);
    background: var(--blue);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 4px 14px -4px rgba(0,83,255,.55), inset 0 1px 0 rgba(255,255,255,.18);
    transition: opacity .22s cubic-bezier(.32,.72,0,1), transform .28s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
  }
  .gate-row:hover .gate-beta-badge {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  .gate-row:nth-child(1){ animation-delay: .08s }
  .gate-row:nth-child(2){ animation-delay: .18s }
  .gate-row:nth-child(3){ animation-delay: .28s }
  .gate-row:nth-child(4){ animation-delay: .38s }
  @keyframes gateIn { from{ opacity:0; transform:translateY(12px) } to{ opacity:1; transform:none } }
  .gate-row:hover {
    background: rgba(255,255,255,.72);
    transform: translateX(5px);
    box-shadow: 0 2px 0 rgba(255,255,255,.9) inset, 0 18px 48px -16px var(--tintShadow, rgba(20,13,138,.28));
  }
  .gate-row:active { transform: translateX(2px) scale(.995); }
  .gate-num {
    font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 600;
    letter-spacing: .18em; color: var(--tint); text-transform: uppercase;
  }
  .gate-icon {
    width: 28px; height: 28px; color: var(--tint); flex-shrink: 0;
  }
  .gate-icon svg { width: 28px; height: 28px; }
  .gate-title {
    font-family: 'Manrope'; font-size: clamp(15px, 1.4vw, 18px); font-weight: 700;
    color: var(--navy); letter-spacing: -.025em; white-space: nowrap;
  }
  .gate-meta {
    font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: .1em;
    text-transform: uppercase; color: rgba(20,13,138,.55);
    background: rgba(20,13,138,.07); padding: 4px 9px; border-radius: 6px;
    white-space: nowrap;
  }
  .gate-status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--green-2); white-space: nowrap;
  }
  .gate-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green-1);
    position: relative; flex-shrink: 0;
  }
  .gate-dot::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid var(--green-1); animation: ringPulse 2.2s ease-out infinite;
  }
  .gate-arr {
    width: 30px; height: 30px; display: grid; place-items: center;
    background: var(--navy); color: #fff; border-radius: 50%; flex-shrink: 0;
    box-shadow: 0 4px 12px -4px rgba(20,13,138,.3);
    transition: background .4s, transform .4s cubic-bezier(.32,.72,0,1);
  }
  .gate-row:hover .gate-arr { background: var(--tint); transform: translateX(2px) scale(1.08); }
  .gate-arr svg { width: 12px; height: 12px; }

  @media (max-width: 640px) {
    .gate-row { grid-template-columns: 36px 28px 1fr 30px; gap: 12px; padding: 14px 16px; }
    .gate-meta, .gate-status { display: none; }
  }

  /* ── Page transitions ── */
  .tx-overlay {
    position: fixed; inset: 0; z-index: 9999; pointer-events: none; overflow: hidden;
  }
  .tx-green {
    background: var(--green-1);
    clip-path: circle(0% at var(--ox,50%) var(--oy,50%));
    animation: txGreenIn .7s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes txGreenIn {
    to { clip-path: circle(200% at var(--ox,50%) var(--oy,50%)); }
  }
  .tx-clouds {
    background: var(--champagne);
    transform: translateY(100%);
    animation: txCloudsIn .85s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes txCloudsIn { to { transform: translateY(0); } }
  .txc {
    position: absolute; opacity: 0;
    animation: txcFade .4s ease-out both;
  }
  .txc:nth-child(1){ top:8%;  left:3%;  width:clamp(180px,22vw,310px); animation-delay:.05s; }
  .txc:nth-child(2){ top:55%; left:58%; width:clamp(130px,16vw,220px); animation-delay:.12s; }
  .txc:nth-child(3){ top:20%; left:33%; width:clamp(150px,18vw,260px); animation-delay:.08s; }
  .txc:nth-child(4){ top:65%; left:77%; width:clamp(100px,12vw,170px); animation-delay:.18s; }
  .txc:nth-child(5){ top:2%;  left:14%; width:clamp(160px,20vw,280px); animation-delay:.02s; }
  @keyframes txcFade { to { opacity:.88; } }
</style>
</head>

// word-splitter with stagger
function RevealWords({text, delay=0, stagger=60, className=""}){
  const ref = useRef(null);
  useEffect(()=>{
    const t = setTimeout(()=>{ ref.current && ref.current.classList.add('in') }, delay);
    return ()=>clearTimeout(t);
  },[delay]);
  const lines = text.split("\n");
  let idx = 0;
  return (
    <span ref={ref} className={"reveal "+className}>
      {lines.map((ln,li)=>(
        <span key={li} style={{display:'block'}}>
          {ln.split(" ").map((w,wi)=>{
            const i = idx++;
            const last = wi === ln.split(" ").length-1;
            return (
              <span key={wi} className="w" style={{animationDelay: (i*stagger)+'ms'}}
                    dangerouslySetInnerHTML={{__html: w + (last ? '' : '&nbsp;')}} />
            );
          })}
        </span>
      ))}
    </span>
  );
}

const schemes = {
  default: [
    {tint:'#00AB61', shadow:'rgba(0,171,97,.55)'},
    {tint:'#140D8A', shadow:'rgba(20,13,138,.55)'},
    {tint:'#E20076', shadow:'rgba(226,0,118,.55)'},
    {tint:'#0053FF', shadow:'rgba(0,83,255,.55)'},
  ],
  warm: [
    {tint:'#FF8867', shadow:'rgba(255,136,103,.6)'},
    {tint:'#E20076', shadow:'rgba(226,0,118,.55)'},
    {tint:'#F385FF', shadow:'rgba(243,133,255,.55)'},
    {tint:'#FF8867', shadow:'rgba(255,136,103,.6)'},
  ],
  mono: [
    {tint:'#00AB61', shadow:'rgba(0,171,97,.55)'},
    {tint:'#05CE78', shadow:'rgba(5,206,120,.55)'},
    {tint:'#140D8A', shadow:'rgba(20,13,138,.5)'},
    {tint:'#00AB61', shadow:'rgba(0,171,97,.55)'},
  ],
};

function App(){
  const [tw,setTw] = useState(TWEAKS_DEFAULTS);
  const [editMode,setEditMode] = useState(false);
  const [clock,setClock] = useState("");
  const [tx, setTx] = useState(null);

  const handleNav = (e, href, type) => {
    e.preventDefault();
    const r = e.currentTarget.getBoundingClientRect();
    const ox = ((r.left + r.width  / 2) / window.innerWidth  * 100).toFixed(1) + '%';
    const oy = ((r.top  + r.height / 2) / window.innerHeight * 100).toFixed(1) + '%';
    setTx({type, href, ox, oy});
    setTimeout(() => { window.location.href = href; }, type === 'clouds' ? 960 : 740);
  };

  useEffect(()=>{
    const t = ()=>{
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      setClock(`${hh}:${mm}`);
    };
    t(); const i = setInterval(t,30000);
    return ()=>clearInterval(i);
  },[]);

  useEffect(()=>{
    const onMsg = (e)=>{
      const d = e.data || {};
      if(d.type==='__activate_edit_mode') setEditMode(true);
      if(d.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=> window.removeEventListener('message', onMsg);
  },[]);

  useEffect(()=>{
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){ e.target.classList.add('revealed'); obs.unobserve(e.target); }
      });
    },{threshold:0.08, rootMargin:'0px 0px -32px 0px'});
    document.querySelectorAll('.card').forEach(c=>obs.observe(c));
    return ()=>obs.disconnect();
  },[]);

  useEffect(()=>{
    const onShow = (e)=>{ if(e.persisted) setTx(null); };
    window.addEventListener('pageshow', onShow);
    return ()=>window.removeEventListener('pageshow', onShow);
  },[]);

  const updateTw = (patch)=>{
    const next = {...tw, ...patch};
    setTw(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: patch}, '*');
  };

  const scheme = schemes[tw.accentScheme] || schemes.default;

  const cards = [
    {
      num:'01 · Advisor',
      title:'Delay Code Advisor',
      desc:'Describe what happened and get the right IATA delay code — with reasoning you can paste into the report.',
      meta:'Interactive',
      icon:<IconAdvisor/>,
      mini: <div className="mini orbit"><svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="14" fill="none" stroke="currentColor" strokeWidth="1" strokeDasharray="2 4"/><circle cx="32" cy="18" r="2" fill="currentColor"/></svg></div>,
      href:'ahm_advisor_mobile.html'
    },
    {
      num:'02 · RICE',
      title:'Backlog Prio Calculator',
      desc:'Score backlog ideas on Reach, Impact, Confidence and Effort — with weighted impact across six operational dimensions.',
      meta:'Calculator',
      icon:<IconRice/>,
      mini: <div className="mini orbit"><svg viewBox="0 0 36 36"><rect x="6" y="8" width="24" height="3" rx="1.5" fill="currentColor" opacity=".55"/><rect x="6" y="16" width="24" height="3" rx="1.5" fill="currentColor" opacity=".75"/><rect x="6" y="24" width="24" height="3" rx="1.5" fill="currentColor"/></svg></div>,
      href:'backlog_prio_calc_v3.html'
    },

  ];

  return (
    <div className="shell">

        <section className="hero">
        <div className="hero-main">
          <div className="eyebrow"><span className="tick"/>Transavia · Ground Ops</div>
          <h1 className="display">
            <RevealWords text={tw.headline} stagger={55} delay={120}/>
          </h1>

          <p className="lede">
            Two tools for the same job: picking the right code and prioritizing what to build next. Pick one to get started.
          </p>

          <div className="section-rule"/>
          <div className="gate-board">
            {cards.map((c,i)=>(
              <a key={i} href={c.href} className="gate-row"
                 onClick={(e)=>handleNav(e, c.href, i===2 ? 'clouds' : 'green')}
                 style={{'--tint': scheme[i].tint, '--tintShadow': scheme[i].shadow}}>
<span className="gate-num">G0{i+1}</span>
                <span className="gate-icon">{c.icon}</span>
                <span className="gate-title">{c.title}</span>
                <span className="gate-meta">{c.meta}</span>
                <span className="gate-arr"><Arr/></span>
              </a>
            ))}
          </div>
        </div>
      </section>

      <footer className="footer">
        <div style={{display:'flex',gap:'20px',flexWrap:'wrap'}}>
          <span className="kbd"><span className="key">1</span>Delay Advisor</span>
          <span className="kbd"><span className="key">2</span>Prio Calc</span>
        </div>
        <span>Transavia · Internal</span>
      </footer>

      {editMode && (
        <div className={"tweaks on"}>
          <h4>Tweaks</h4>
          <label>Accent scheme
            <select value={tw.accentScheme} onChange={e=>updateTw({accentScheme:e.target.value})}>
              <option value="default">Green · Navy · Ruby</option>
              <option value="warm">Warm accents</option>
              <option value="mono">Greens only</option>
            </select>
          </label>
          <label>Headline
            <input type="text" value={tw.headline.replace(/\n/g,' / ')}
                   onChange={e=>updateTw({headline: e.target.value.replace(/ \/ /g,'\n')})} />
          </label>
          <label>Card accents
            <input type="checkbox" checked={tw.showMini} onChange={e=>updateTw({showMini:e.target.checked})}/>
          </label>
          <label>Motion
            <select value={tw.motion} onChange={e=>updateTw({motion:e.target.value})}>
              <option value="on">Lively</option>
              <option value="calm">Extra calm</option>
            </select>
          </label>
        </div>
      )}

      {tw.motion==='calm' && <style>{`
        .orb{ animation-duration: 60s !important }
        .mini.bars span{ animation-duration: 5s !important }

function LiveTicker(){
  const [v, setV] = useState(0);
  useEffect(()=>{
    const i = setInterval(()=>setV(x=>x+1), 2400);
    return ()=>clearInterval(i);
  },[]);
  return v;
}

function Counter({to, suffix=""}){
  const [v,setV] = useState(0);
  useEffect(()=>{
    const start = performance.now(); const dur = 1400;
    let raf;
    const tick = (t)=>{
      const p = Math.min(1,(t-start)/dur);
      const e = 1-Math.pow(1-p,3);
      setV(Math.floor(e*to));
      if(p<1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[to]);
  return <>{v}{suffix}</>;
}

function EuroMap(){
  // EU bbox: lon [-12, 32], lat [34, 62]
  const BBOX = { lamin:34, lamax:62, lomin:-12, lomax:32 };
  const project = (lon, lat) => {
    const x = ((lon - BBOX.lomin) / (BBOX.lomax - BBOX.lomin)) * 100;
    const y = (1 - (lat - BBOX.lamin) / (BBOX.lamax - BBOX.lamin)) * 100;
    return { x, y };
  };
  const AMS = project(4.76, 52.31);

  const [flights, setFlights] = React.useState([]);
  const [source, setSource] = React.useState('loading');

  // fallback simulated flights (used if OpenSky unreachable)
  const seedSim = () => {
    const rnd = (a,b)=>a+Math.random()*(b-a);
    return Array.from({length:18}).map((_,i)=>({
      id:'sim-'+i,
      lon: rnd(-10,30),
      lat: rnd(36,60),
      hdg: rnd(0,360),
      delayed: Math.random()<0.25,
      vx: rnd(-0.06,0.06), vy: rnd(-0.04,0.04)
    }));
  };

  React.useEffect(()=>{
    let alive = true;
    let simState = null;
    let simTimer = null;

    const runSim = ()=>{
      if(!simState) simState = seedSim();
      simState = simState.map(f=>{
        let lon = f.lon + f.vx, lat = f.lat + f.vy;
        if(lon < BBOX.lomin || lon > BBOX.lomax) f.vx *= -1;
        if(lat < BBOX.lamin || lat > BBOX.lamax) f.vy *= -1;
        lon = Math.max(BBOX.lomin, Math.min(BBOX.lomax, lon));
        lat = Math.max(BBOX.lamin, Math.min(BBOX.lamax, lat));
        const hdg = (Math.atan2(f.vx, -f.vy) * 180/Math.PI + 360) % 360;
        return {...f, lon, lat, hdg};
      });
      if(alive) setFlights(simState);
    };

    const fetchReal = async ()=>{
      try{
        const url = `https://opensky-network.org/api/states/all?lamin=${BBOX.lamin}&lamax=${BBOX.lamax}&lomin=${BBOX.lomin}&lomax=${BBOX.lomax}`;
        const ctrl = new AbortController();
        const to = setTimeout(()=>ctrl.abort(), 4500);
        const r = await fetch(url, {signal: ctrl.signal});
        clearTimeout(to);
        if(!r.ok) throw new Error('bad status');
        const j = await r.json();
        if(!alive) return;
        const rows = (j.states||[])
          .filter(s => s[5]!=null && s[6]!=null)
          .slice(0, 60)
          .map(s=>({
            id: s[0],
            lon: s[5], lat: s[6],
            hdg: s[10] ?? 0,
            delayed: (s[0] || '').charCodeAt(0) % 5 === 0 // mock flag
          }));
        setFlights(rows);
        setSource('live');
      } catch(err){
        if(!alive) return;
        if(source !== 'live') setSource('simulated');
        if(!simTimer){
          runSim();
          simTimer = setInterval(runSim, 1400);
        }
      }
    };

    fetchReal();
    const poll = setInterval(fetchReal, 30000);
    return ()=>{ alive = false; clearInterval(poll); if(simTimer) clearInterval(simTimer); };
  // eslint-disable-next-line
  },[]);

  return (
    <div className="lp-map">

          L 80.0 59.8 L 77.4 59.0 L 75.8 57.2 L 73.9 55.8 L 72.6 54.0 L 71.4 52.0 L 70.2 50.1 L 69.4 48.2
          L 68.0 46.8 L 66.2 45.9 L 64.1 45.6 L 62.0 46.2 L 59.8 47.0 L 57.6 47.9 L 55.4 48.7 L 53.2 49.0

          L 38.0 50.7 L 36.8 52.4 L 35.2 53.4 L 33.5 53.7 L 31.8 53.0 L 30.4 51.6 L 30.0 49.8 L 30.3 47.9
          L 31.0 46.1 L 31.9 44.4 L 32.0 42.6 L 31.2 41.0 L 29.9 39.8 L 28.2 39.2 L 26.5 39.8 L 25.4 41.4

        "/>

      {flights.map(f=>{
        const p = project(f.lon, f.lat);
        return (
          <div key={f.id} className={"fp "+(f.delayed?'delayed':'on-time')}

function KeyJump({hrefs}){
  useEffect(()=>{
    const onKey = (e)=>{
      if(e.key==='1') document.querySelectorAll('.card')[0]?.click();

    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[]);

}

<style>
/* ── Scroll snap + cloudscape ── */
.cloudscape {
  scroll-snap-align: start;
  height: 100dvh;
  position: relative;
  overflow: hidden;
  z-index: 1;
  background: var(--champagne);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-end;
}

/* clouds */
.cs-clouds { position: absolute; inset: 0; pointer-events: none; }
.cs-cloud   { position: absolute; opacity: 0; }
.cs-c1 { top: 10%; width: clamp(180px,22vw,310px); animation: csCloud 22s linear  0.2s infinite; }
.cs-c2 { top: 55%; width: clamp(130px,16vw,220px); animation: csCloud 31s linear -9s   infinite; }
.cs-c3 { top: 22%; width: clamp(150px,18vw,260px); animation: csCloud 27s linear -4s   infinite; }
.cs-c4 { top: 68%; width: clamp(100px,12vw,170px); animation: csCloud 35s linear -15s  infinite; }
.cs-c5 { top:  4%; width: clamp(160px,20vw,280px); animation: csCloud 29s linear -21s  infinite; }

@keyframes csCloud {
  0%   { transform: translateX(110vw); opacity: 0;   }
  6%   {                               opacity: 0.9; }
  94%  {                               opacity: 0.9; }
  100% { transform: translateX(-340px); opacity: 0;  }
}

/* plane — always visible, just bobs */
.cs-plane-wrap {
  position: absolute;
  top: 36%;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
.cs-plane-bob {
  animation: csBob 2.2s ease-in-out infinite;
  will-change: transform;
}
.cs-plane-bob img {
  width: min(62vw, 500px);
  height: auto;
  display: block;
  filter: drop-shadow(0 10px 32px rgba(20,13,138,.22));
  user-select: none;
  pointer-events: none;
}
@keyframes csBob {
  0%, 100% { transform: translateY(0);    }
  50%       { transform: translateY(-6px); }
}

/* branding strip */
.cs-brand {
  position: relative;
  z-index: 2;
  padding: 0 0 clamp(28px,5vh,56px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.cs-brand-name {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 700;
  letter-spacing: -.03em;
  color: var(--navy);
  opacity: .75;
}
.cs-brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(20,13,138,.4);
}

@media (max-width: 500px) {
  .cs-c1, .cs-c3, .cs-c5 { display: none; }
  .cs-plane-bob img { width: 88vw; }
}
</style>
