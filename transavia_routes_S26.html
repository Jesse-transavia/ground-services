  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #F9F0E9; color: #140D8A; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  #header {
    background: #05CE78;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 64px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #logo {
    overflow: hidden;
    height: 64px;
    display: flex;
    align-items: center;
  }
  #logo img {
    height: 100px;
    width: auto;
    display: block;
  }
  #header-divider {
    width: 1px; height: 28px;
    background: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  #header-title {
    font-size: 16px;
    font-weight: 700;
    color: #140D8A;
    font-family: 'SohneBreit', sans-serif;
  }

  #toolbar {
    background: #fff;
    border-bottom: 1px solid rgba(20,13,138,0.1);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label {
    font-size: 11px; font-weight: 700; color: #140D8A;
    opacity: 0.45; text-transform: uppercase; letter-spacing: 0.6px;
  }
  .hub-btn {
    font-size: 12px; font-weight: 600; padding: 4px 14px;
    border-radius: 20px; border: 1.5px solid rgba(20,13,138,0.2);
    background: #fff; color: #140D8A; cursor: pointer; transition: all .15s;
  }
  .hub-btn:hover { border-color: #05CE78; color: #05CE78; }
  .hub-btn.on { background: #140D8A; color: #fff; border-color: #140D8A; }

  .sch-btn {
    font-size: 12px; font-weight: 600; padding: 4px 14px;
    border-radius: 20px; border: 1.5px solid rgba(20,13,138,0.2);
    background: #fff; color: #140D8A; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .sch-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sch-btn.on.schengen     { background: #05CE78; color: #fff; border-color: #05CE78; }
  .sch-btn.on.non-schengen { background: #E20076; color: #fff; border-color: #E20076; }

  #status { margin-left: auto; font-size: 12px; font-weight: 500; color: #140D8A; opacity: 0.45; }

  #map { flex: 1; min-height: 0; }

  .map-legend {
    background: #fff;
    border-radius: 12px;
    border: 1px solid rgba(20,13,138,0.1);
    padding: 14px 16px;
    font-size: 12px;
    font-family: 'Sohne', sans-serif;
    box-shadow: 0 4px 16px rgba(20,13,138,0.08);
    min-width: 192px;
  }
  .map-legend h3 {
    font-size: 10px; font-weight: 700; color: #140D8A;
    opacity: 0.45; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
  }
  .legend-row {
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 5px; font-weight: 500; color: #140D8A; font-size: 12px;
  }
  .legend-line { width: 26px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-sep { border: none; border-top: 1px solid rgba(20,13,138,0.08); margin: 8px 0; }

const HUBS = ["AMS","RTM","BRU","EIN"];
const SCH_COLOR = "#05CE78";
const NON_COLOR = "#E20076";

function isSchengen(dep, arr) { return SCHENGEN_AIRPORTS.has(dep) && SCHENGEN_AIRPORTS.has(arr); }
function getHub(dep, arr) {
  if (HUBS.includes(dep)) return dep;
  if (HUBS.includes(arr)) return arr;
  return null;
}

const map = L.map('map', { center: [42, 10], zoom: 4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const maxFreq = Math.max(...ROUTES.map(r => r[2]));
const polylines = [];
const activeHubs  = new Set(HUBS);
const activeTypes = new Set(["schengen","non-schengen"]);

ROUTES.forEach(([dep, arr, freq]) => {
  const a1 = AIRPORTS[dep], a2 = AIRPORTS[arr];
  if (!a1 || !a2) return;
  const hub = getHub(dep, arr);
  if (!hub) return;
  const sch = isSchengen(dep, arr);
  const color = sch ? SCH_COLOR : NON_COLOR;
  const t = freq / maxFreq;
  const pl = L.polyline([[a1[0],a1[1]],[a2[0],a2[1]]], {
    color, weight: 0.8 + 4*t, opacity: 0.22 + 0.65*t
  }).addTo(map);
  pl.bindTooltip(
    `<b>${dep} → ${arr}</b><br>${a1[2]} (${a1[3]}) → ${a2[2]} (${a2[3]})<br>${freq} flights &nbsp;·&nbsp; ` +
    `<span style="color:${color};font-weight:700">${sch ? "✓ Schengen" : "✗ Non-Schengen"}</span>`,
    { sticky: true }
  );
  pl._hub  = hub;
  pl._type = sch ? "schengen" : "non-schengen";
  polylines.push(pl);
});

Object.entries(AIRPORTS).forEach(([code, info]) => {
  const [lat, lon, name, country] = info;
  const isHub = HUBS.includes(code);
  const connected = ROUTES.some(([d,a]) => d===code || a===code);
  if (!connected) return;
  const sch = SCHENGEN_AIRPORTS.has(code);
  const color = sch ? SCH_COLOR : NON_COLOR;
  L.circleMarker([lat,lon], {
    radius: isHub ? 9 : 4,
    fillColor: isHub ? "#fff" : color,
    color, weight: isHub ? 3 : 1.5,
    fillOpacity: isHub ? 1 : 0.9
  }).addTo(map).bindTooltip(
    `<b>${code}</b>${isHub ? " · Hub" : ""}<br>${name}, ${country}<br>` +
    `<span style="color:${color}">${sch ? "Schengen zone" : "Non-Schengen"}</span>`,
    { sticky: true }
  );
});

const legend = L.control({ position: "bottomleft" });
legend.onAdd = () => {
  const d = L.DomUtil.create("div","map-legend");
  d.innerHTML = `
    <h3>Route type</h3>
    <div class="legend-row"><div class="legend-line" style="background:${SCH_COLOR}"></div>Schengen–Schengen</div>
    <div class="legend-row"><div class="legend-line" style="background:${NON_COLOR}"></div>Involves non-Schengen</div>
    <hr class="legend-sep">
    <h3>Airports</h3>
    <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;border:2.5px solid ${SCH_COLOR};background:#fff;flex-shrink:0"></div>Hub airport</div>
    <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;background:${SCH_COLOR};flex-shrink:0"></div>Schengen destination</div>
    <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;background:${NON_COLOR};flex-shrink:0"></div>Non-Schengen destination</div>
    <p class="legend-note">Line weight = flight frequency</p>`;
  return d;
};
legend.addTo(map);

function applyFilters() {
  let n = 0;
  polylines.forEach(pl => {
    const show = activeHubs.has(pl._hub) && activeTypes.has(pl._type);
    show ? pl.addTo(map) : pl.remove();
    if (show) n++;
  });
  document.getElementById("status").textContent = n + " routes shown";
}

document.querySelectorAll(".hub-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const h = btn.dataset.hub;
    if (activeHubs.has(h)) { if (activeHubs.size > 1) { activeHubs.delete(h); btn.classList.remove("on"); } }
    else { activeHubs.add(h); btn.classList.add("on"); }
    applyFilters();
  });
});

document.querySelectorAll(".sch-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const t = btn.dataset.type;
    if (activeTypes.has(t)) { if (activeTypes.size > 1) { activeTypes.delete(t); btn.classList.remove("on"); } }
    else { activeTypes.add(t); btn.classList.add("on"); }
    applyFilters();
  });
});

applyFilters();
